<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Galeria de Raposas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
 <script src="./foxapi.js" defer></script>
</head>
<body>

    <div class="container">

       <h1>Galeria de Raposas</h1>
        <p class="intro">
            Explore imagens aleatórias de raposas de forma simples e divertida!
            Digite quantas imagens deseja visualizar e descubra essas criaturas incríveis.
        </p>

        <div class="busca">
            <input id="quantidade" type="number" placeholder="Ex: 5">
            <button id="pesquisar">Buscar</button>
        </div>

        <div class="galeria" id="galeria"></div>

    </div>

</body>
